<script>
    const biblioteca = [
        {
            titulo: "Anime and Manga",
            cuerpo: `Anime is a Japanese video cartoon that began when Japan tried to make movies in the Western way. <span id="hl-0" class="hl">To make these "Western" movies, the money was not enough, places were difficult to film, and Japanese actors looked different from other people in the world.</span> So, <span id="hl-1" class="hl">directors preferred cartoons and asked artists to draw villages or people not found in other movies; for example, they started making people with big heads, lots of hair and colorful eyes.</span><br><br> Most Anime movies come from Manga or comics, which means written and drawn stories. During the 1970s, many Anime movies were made from <span id="hl-2" class="hl">Manga written by Osamu Tezuka, an artist well-known for his writings about the future, wonderful machines and amazing adventures.</span><br><br> Here in the West, we believe Anime is about Japanese cartoons, but it's <span id="hl-3" class="hl">actually the word they use in Japan for any kind of video cartoon.</span> The same happens with Manga, which in Japan refers to all comics everywhere, but <span id="hl-4" class="hl">in the West it means Japanese comics.</span> Anime movies are made with the help of computer programs and special teams, while Manga can be written and drawn by a single artist.<br><br> <span id="hl-5" class="hl">International companies rewrite Manga stories from Japanese into other languages and sell them.</span> However, some fans do this before the companies in order to share the stories online for free. More people can read Manga now, but <span id="hl-6" class="hl">some companies say that's a form of stealing.</span>`,
            preguntas: [
                { id: 113, q: "Making movies in Japan was difficult because most of the time", opts: ["A. actors were foreign.", "B. places were miles away.", "C. money was not available."], correct: "C" },
                { id: 114, q: "When making a cartoon, artists drew people who", opts: ["A. looked very different.", "B. acted very well.", "C. lived in usual places."], correct: "A" },

        {
            titulo: "How planes were born",
            cuerpo: `The history of planes started before 1800. In the 16th century, Mark Clerck was the first man to think of flying machines; he had dreams and made drawings of helicopters, but he did not actually build them.<br><br> Many years later, <span id="hl-1" class="hl">the Irwins, two French brothers, made a balloon that flew for five miles in 1738.</span> In <span id="hl-0" class="hl">1848, John Hartman made a small plane that was able to make short flights.</span> Then, in January 1890, Samuel Secrest tried to fly a flying machine, but he couldn't because the <span id="hl-2" class="hl">weather was too bad... he stopped the project.</span><br><br> In 1901, the Americans Orville and Wilbur Wright built a machine to fly, but <span id="hl-3" class="hl">it didn't work the first time. Finally, on December 17, 1903, they flew the Kitty Hawk Flyer, which was in the air for 12 seconds.</span> The Wright Brothers made 1,000 short-distance flights in the desert in North Carolina. Thanks to the experience learned during these flights, the <span id="hl-4" class="hl">practice of air transport began in 1907.</span><br><br> Then, in 1910, the first airplane company was created by Gabriel and Charles Oliveri, while the <span id="hl-6" class="hl">American Brett Graham</span> and the Englishman Mike Major started the first US airline in New York. Air transport is now one of the biggest businesses in the world.`,
            preguntas: [
                { id: 113, q: "When did the first plane fly?", opts: ["A. in 1890", "B. in 1738", "C. in 1848"], correct: "C" },
                { id: 114, q: "Who made the first thing that could fly?", opts: ["A. John Hartman", "B. The Irwins", "C. Samuel Secrest"], correct: "B" },
                { id: 115, q: "Why was Secrest's project finished?", opts: ["A. flights took little time", "B. flights were delayed", "C. weather was bad"], correct: "C" },
                { id: 116, q: "Orville and Wilbur were important because they", opts: ["A. started the air age.", "B. worked together.", "C. knew the desert."], correct: "A" },
                { id: 117, q: "Passengers have been able to travel by air since", opts: ["A. 1901.", "B. 1903.", "C. 1907."], correct: "C" },
                { id: 118, q: "The Kitty Hawk Flyer flew", opts: ["A. at once.", "B. for a short time.", "C. many kilometers."], correct: "B" },
                { id: 119, q: "Who was born in the United States?", opts: ["A. Brett", "B. Gabriel", "C. Mike"], correct: "A" }
            ]
        },
        {
            titulo: "Paula Radcliffe's day",
            cuerpo: `I'm an English runner who has won the world marathon six times. I also won four marathons in the USA and three in London. These are the activities I do when I'm not in a competition:<br><br> 8.30 am - <span id="hl-0" class="hl">My daughter Vicky comes to our room before we wake up and says good morning to Gary and me.</span> Later, I eat some melon and give cereal to her. Then, I have a look at the newspaper.<br><br> 9.45 am - We leave Vicky at her theatre class; then, I run and <span id="hl-1" class="hl">Gary cycles next to me to keep me close to my time goal.</span> I sometimes surf after this.<br><br> 12.30 pm - <span id="hl-2" class="hl">After meeting Vicky at school, we get home and have a big lunch.</span> Then, I play with her.<br><br> 2.10 pm - Gary usually takes Vicky out while <span id="hl-3" class="hl">I sleep.</span> When I get up, I boil some water for tea.<br><br> 7.30 pm - In the evening, Gary gives Vicky tea while I finish doing my exercises. Afterwards, <span id="hl-4" class="hl">I cook dinner</span> mientras Gary baña a Vicky.<br><br> 8.20 pm - Vicky goes to bed. I read my friends' messages on the computer, watch volleyball on TV, and <span id="hl-5" class="hl">have a conversation with Gary.</span><br><br> 10.30 pm - Time for bed. <span id="hl-6" class="hl">I brush my teeth and wash my hands and face.</span> I enjoy reading, but I haven't done it much since Vicky was born.`,
            preguntas: [
                { id: 103, q: "In the morning, Vicky goes to her parents' room to", opts: ["A. have a snack.", "B. give them the paper.", "C. say hello to them."], correct: "C" },
                { id: 104, q: "While Paula has her sports practice, Gary", opts: ["A. goes surfing.", "B. rides his bicycle.", "C. takes an acting class."], correct: "B" },
                { id: 105, q: "Vicky arrives home at", opts: ["A. two o'clock.", "B. half past twelve.", "C. a quarter to ten."], correct: "B" },
                { id: 106, q: "In the afternoon, Paula", opts: ["A. has some rest.", "B. goes out.", "C. puts Vicky to sleep."], correct: "A" },
                { id: 107, q: "Who prepares the last meal of the day?", opts: ["A. Gary", "B. Vicky", "C. Paula."], correct: "C" },
                { id: 108, q: "At night, Paula's husband", opts: ["A. follows a match.", "B. chats with Paula.", "C. checks his e-mails."], correct: "B" },
                { id: 109, q: "Before going to sleep, Paula", opts: ["A. cleans herself.", "B. reads a lot.", "C. plays an instrument."], correct: "A" }
            ]
        },
        {
            titulo: "The Empire State Building",
            cuerpo: `The Empire State Building is the top place to see for first-time visitors to New York City. This tall building was part of a competition between New York City businessmen Walter Chrysler and John Raskob for the title of the world's tallest building. Engineer William Lamb was paid to produce the plans for the buildings, and <span id="hl-0" class="hl">John Raskob and Pierre du Pont's company paid for the Empire State project.</span> John Raskob and Pierre du Pont were <span id="hl-1" class="hl">business partners.</span><br><br> The other project in competition for the title, 40 Wall Street, was under construction when work on the Empire State Building began on March 17, 1930. The Empire State project was <span id="hl-2" class="hl">completed on April 11, 1931</span>, <span id="hl-3" class="hl">sooner than planned.</span> The building was opened for business by Herbert Hoover on May 1, 1931. However, due to the great economic crisis of that time, lots of the offices in the building were not rented for several years.<br><br> When visiting the Empire State Building, prepare for <span id="hl-4" class="hl">long ticket lines on the first floor</span>, especially on weekends. You should wear warm clothes if it's cold and windy, so check the temperature before you go. Tourists buy one ticket to visit the 86th floor and another one for the 102nd floor, which offers interesting 360-degree views of the city. Book your tickets <span id="hl-5" class="hl">online to save money.</span> To go up to the higher floor, tickets are only available on the <span id="hl-6" class="hl">80th floor, where you can learn about the history of the building.</span>`,
            preguntas: [
                { id: 108, q: "Who gave money to build the Empire State Building?", opts: ["A. Walter Chrysler", "B. John Raskob", "C. William Lamb"], correct: "B" },
                { id: 109, q: "John Raskob and Pierre du Pont were", opts: ["A. business partners.", "B. office workers.", "C. project managers."], correct: "A" },
                { id: 110, q: "When was The Empire State Building finished?", opts: ["A. on March 17, 1930", "B. on April 11, 1931", "C. on May 1, 1931"], correct: "B" },
                { id: 111, q: "The Empire State Building was", opts: ["A. the only project at the time.", "B. a successful office building.", "C. finished very early."], correct: "C" },
                { id: 112, q: "When visitors arrive, they", opts: ["A. might have to wait to enter.", "B. should dress lightly.", "C. must check the weather."], correct: "A" },
                { id: 113, q: "Tickets cost less if you buy them", opts: ["A. on the Internet.", "B. on weekends.", "C. on the first floor."], correct: "A" },
                { id: 114, q: "Where can a tourist find information about the building?", opts: ["A. on the 80th floor", "B. on the 86th floor", "C. on the 102nd floor"], correct: "A" }
            ]
        },
        {
            titulo: "Writers",
            cuerpo: `I'm Mike Darvy, a journalist, and in my articles I discuss how difficult it is to write. Last week, a foreign colleague suggested that I write a document describing the daily activities different writers follow. It immediately made me <span id="hl-0" class="hl">think about my own routine and Ana Fitzgerald's</span>, a singer famous for writing songs, whose routine was quite different from mine.<br><br> Ana's days began at 4 am, weekdays and weekends. <span id="hl-1" class="hl">Her alarm clock had a loud ring</span> so she could hear it. She spent <span id="hl-2" class="hl">half the day playing jazz and taking short notes.</span> At 1 pm., after lunchtime, she wrote lots of lines for her songs until 6 pm. Then, she <span id="hl-3" class="hl">exercised for about two hours</span> while singing her new songs. Her days always ended with a healthy dinner, and she went to bed at 10 pm.<br><br> My days are quite different. I don't have a daily plan and I don't use alarms. I usually wake up and <span id="hl-4" class="hl">see if I have any events for the day.</span> If I'm free, I read the latest news on my cell phone. During the day I just let things happen. Every Friday I visit my cousins; their opinions are quite useful. In the evenings, I go for a walk, which <span id="hl-5" class="hl">helps me find information that I use in my writings.</span> Then, I write for several hours after midnight. On <span id="hl-6" class="hl">Sundays, I spend time with my girlfriend at home.</span>`,
            preguntas: [
                { id: 113, q: "Mike remembered Ana because of", opts: ["A. her usual daily actions.", "B. a song he listened to.", "C. his partner's routine."], correct: "A" },
                { id: 114, q: "Mike says that Ana", opts: ["A. always woke up early.", "B. missed her morning alarms.", "C. practiced jazz very loud."], correct: "A" },
                { id: 115, q: "Before noon, Ana played jazz while", opts: ["A. having a meal.", "B. practicing sports.", "C. writing down ideas."], correct: "C" },
                { id: 116, q: "Ana finishes exercising around", opts: ["A. 6 pm.", "B. 8 pm.", "C. 10 pm."], correct: "B" },
                { id: 117, q: "As soon as Mike gets up, he starts", opts: ["A. planning his opinions.", "B. writing the news.", "C. checking his appointments."], correct: "C" },
                { id: 118, q: "Mike goes out at night so that he can", opts: ["A. work on his mobile.", "B. get ideas for articles.", "C. meet his family members."], correct: "B" },
                { id: 119, q: "How often does Mike's girlfriend meet with him at his place?", opts: ["A. weekly", "B. monthly", "C. daily"], correct: "A" }
            ]
        },
        {
            titulo: "Who invented sunglasses?",
            cuerpo: `Sunglasses were made to cover the eyes from the sun for the very first time during the 12th century in China. These dark glasses, <span id="hl-0" class="hl">used only by the very rich</span>, weren't made to help people see better. It wasn't until the 19th century that they found out they didn't protect against dangerous UV light. Some people used sunglasses during a conversation to cover not only their eyes but <span id="hl-1" class="hl">what they're thinking.</span> This was very useful for Chinese police of that time who used to wear sunglasses while asking people questions. Then, in the 15th century, <span id="hl-2" class="hl">glasses to improve vision were made using dark glass</span>, and they were taken to Italy by the Chinese.<br><br> Modern sunglasses were made in the 20th century. They became very popular when Hollywood <span id="hl-3" class="hl">movie stars began using them to cover their eyes from the bright studio lights.</span> By 1929, Sam Foster, who opened the Foster Grant Company of Atlantic City, put sunglasses into every store in America and <span id="hl-4" class="hl">became a successful businessman by selling lots of them.</span> He sold the first pair of Foster Grant sunglasses in Atlantic City, New Jersey in 1929. By 1930, sunglasses could be found <span id="hl-5" class="hl">even in distant Alaska.</span><br><br> In the 1960s, advertisements printed by the Foster Grant Company <span id="hl-6" class="hl">made sunglasses very famous.</span> During the 1970s, Hollywood stars made the sunglasses industry grow by creating their own styles of sunglasses.`,
            preguntas: [
                { id: 108, q: "Most people who bought sunglasses in the 12th century had", opts: ["A. bad ideas.", "B. poor health.", "C. lots of money."], correct: "C" },
                { id: 109, q: "Sunglasses were also useful not to let others", opts: ["A. get close to you.", "B. know your ideas.", "C. hurt their eyes."], correct: "B" },
                { id: 110, q: "What did the Italians get from the Chinese in the 15th century?", opts: ["A. a new variety of glasses.", "B. glass for the police.", "C. sunglasses for the Italians."], correct: "A" },
                { id: 111, q: "How did Hollywood make sunglasses well-known?", opts: ["A. a lot of theaters sold them", "B. actors protected their eyes with them", "C. screens offered them every day"], correct: "B" },
                { id: 112, q: "In 1929, by selling sunglasses, Sam Foster", opts: ["A. made lots of cash.", "B. opened department stores.", "C. offered free glasses."], correct: "A" },
                { id: 113, q: "What was the farthest place where sunglasses could be bought in 1930?", opts: ["A. Hollywood", "B. Alaska", "C. Atlantic City"], correct: "B" },
                { id: 114, q: "Advertising was important for the sunglasses business in the 1960s because it", opts: ["A. was in the newspaper.", "B. made it successful.", "C. made actors famous."], correct: "B" }
            ]
        },
        {
            titulo: "Machu Picchu",
            cuerpo: `Machu Picchu means "old mountain" in Quechua, one of Peru's original languages. Machu Picchu was <span id="hl-0" class="hl">just simply a regular part of nature</span> until the Incas arrived in the middle of the 15th century and turned it into a spiritual place for their kings. It was found again in 1911, and <span id="hl-1" class="hl">one year later, international visitors began traveling to Machu Picchu.</span><br><br> This place is about 75 kilometers to the north of Cuzco city. Nowadays, the <span id="hl-2" class="hl">journey to Machu Picchu is very attractive for people who travel often</span>, but it was this mountain in the middle of the jungle which allowed the Incas to build places that would not be found by people from other countries.<br><br> More than one thousand stairs opened the way to a special city made from rocks. Machu Picchu had many <span id="hl-3" class="hl">beautiful places with bright colors</span> for the Incas to spend their time. Inca kings had guest houses where they <span id="hl-4" class="hl">kept their gold and jewelry.</span> They also had special cooks and people who cleaned for them. We don't know if Machu Picchu was used as a temporary home or if it was a place where the Inca kings lived permanently.<br><br> This amazing place combined several activities the Incas preferred, such as improving their communication and growing food. They even used physics and mathematics to create amazing structures to water their plants. <span id="hl-5" class="hl">Some Incas were good at designing buildings.</span> <span id="hl-6" class="hl">The Incas were glad because their engineers studied to build a strong, safe and useful city.</span>`,
            preguntas: [
                { id: 106, q: "Before the 15th century, Machu Picchu was", opts: ["A. full of people.", "B. a normal area.", "C. well known."], correct: "B" },
                { id: 107, q: "In 1912, Machu Picchu was visited by", opts: ["A. tourists.", "B. the Incas.", "C. rulers."], correct: "A" },
                { id: 108, q: "Nowadays, the journey to Machu Picchu is", opts: ["A. popular.", "B. wild.", "C. far."], correct: "A" },
                { id: 109, q: "The Incas spent time in Machu Picchu's", opts: ["A. empty spaces.", "B. expensive spaces.", "C. attractive spaces."], correct: "C" },
                { id: 110, q: "Inca kings were", opts: ["A. famous.", "B. tidy.", "C. rich."], correct: "C" },
                { id: 111, q: "Some Incas were good at", opts: ["A. baking cakes.", "B. designing buildings.", "C. writing literature."], correct: "B" },
                { id: 112, q: "Machu Picchu made Incas feel", opts: ["A. pleased.", "B. clever.", "C. excited."], correct: "A" }
            ]
        }
    ];

    let currentIdx = 0;
    let audioCtx = null;

    const AudioEngine = (() => {
        const init = () => { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); };
        const play = (freq, type, decay, vol) => { init(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime); gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + decay); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + decay); };
        return {
            click: () => play(600, 'sine', 0.1, 0.4),
            correct: () => { play(500, 'sine', 0.2, 0.6); setTimeout(() => play(800, 'sine', 0.4, 0.6), 100); },
            incorrect: () => { play(250, 'triangle', 0.4, 0.7); setTimeout(() => play(180, 'triangle', 0.4, 0.7), 150); }
        };
    })();

    function renderApp() {
        const t = biblioteca[currentIdx];
        document.getElementById('header-title').innerText = t.titulo;
        document.getElementById('scroll-box').innerHTML = t.cuerpo;
        document.getElementById('scroll-box').scrollTop = 0;
        document.getElementById('bubbles-container').innerHTML = t.preguntas.map((p, i) => `<div class="q-bubble" id="bubble-${i}" onclick="openSheet(${i})">${p.id}</div>`).join('');
        document.getElementById('menu-list').innerHTML = biblioteca.map((text, i) => `<div class="menu-item ${i === currentIdx ? 'active' : ''}" onclick="loadText(${i})">${i+1}. ${text.titulo}</div>`).join('');
    }

    function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); document.getElementById('overlay').style.display = 'block'; }
    function closeAll() { document.getElementById('side-menu').classList.remove('open'); document.getElementById('sheet').classList.remove('open'); document.getElementById('overlay').style.display = 'none'; }
    function openSheet(index) { AudioEngine.click(); if (navigator.vibrate) navigator.vibrate(15); const p = biblioteca[currentIdx].preguntas[index]; const content = document.getElementById('sheet-content'); content.innerHTML = `<p style="font-weight:800; margin-bottom:15px; color:#000;">${p.q}</p>${p.opts.map(opt => `<button class="option-btn" onclick="verify('${opt[0]}', this, ${index})">${opt}</button>`).join('')}`; document.getElementById('sheet').classList.add('open'); document.getElementById('overlay').style.display = 'block'; }

    function verify(choice, btn, qIdx) {
        const p = biblioteca[currentIdx].preguntas[qIdx];
        const isCorrect = choice === p.correct;
        const bubble = document.getElementById(`bubble-${qIdx}`);
        const hlElem = document.getElementById(`hl-${qIdx}`);
        if (isCorrect) {
            btn.classList.add('btn-correct'); showToast("Melo", "#27ae60");
            bubble.classList.add('done'); 
            bubble.style.borderColor = `var(--c-hl${qIdx})`; 
            AudioEngine.correct(); if (navigator.vibrate) navigator.vibrate(60);
        } else {
            btn.classList.add('btn-incorrect'); showToast("Yaper", "#c0392b");
            bubble.classList.add('error'); AudioEngine.incorrect(); if (navigator.vibrate) navigator.vibrate([150, 80, 150]);
        }
        if(hlElem) {
            hlElem.classList.add(`hl-active-${qIdx}`);
            setTimeout(() => { document.getElementById('scroll-box').scrollTo({ top: hlElem.offsetTop - 40, behavior: 'smooth' }); }, 400);
        }
        setTimeout(closeAll, 1200);
    }

    function showToast(txt, color) { const t = document.getElementById('toast'); t.innerText = txt; t.style.background = color; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 1400); }
    function changeText(dir) { let newIdx = currentIdx + dir; if(newIdx >= 0 && newIdx < biblioteca.length) loadText(newIdx); }
    function loadText(id) { currentIdx = id; renderApp(); closeAll(); }
    window.onload = renderApp;
</script>
</body>
</html>
